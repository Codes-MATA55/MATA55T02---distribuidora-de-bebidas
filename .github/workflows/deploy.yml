name: Deploy — Distribuidora de Bebidas

on:
  push:
    branches:
      - main        # deploy em produção
      - develop     # ambiente de homologação

jobs:
  # ─── Testes ───────────────────────────────────────────────
  test:
    name: Testes unitários
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configura Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instala dependências
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-django

      - name: Roda testes
        env:
          DJANGO_SETTINGS_MODULE: distribuidora.settings
          DB_JSON_PATH: data/db.json
        run: pytest tests/ -v

  # ─── Build & Push da imagem Docker ────────────────────────
  build:
    name: Build Docker Image
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build e Push da imagem
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/distribuidora:latest
            ${{ secrets.DOCKER_USERNAME }}/distribuidora:${{ github.sha }}

  # ─── Deploy no servidor de produção ───────────────────────
  deploy:
    name: Deploy em Produção
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/distribuidora
            docker compose pull
            docker compose up -d --force-recreate
            docker image prune -f
            echo "✅ Deploy concluído — $(date)"
