name: Linter

on:

  push:
    branches:
      - '**'
  pull_request:
    branches: 
      - main
      - homologacao

jobs:
  check-rules:
    runs-on: ubuntu-latest
    steps:
    - name: Baixando o repositório
      uses: actions/checkout@v4

    - name: Configurando o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalando o Flake8
      run: |
        python -m pip install --upgrade pip
        pip install flake8 flake8-cognitive-complexity flake8-bugbear

    - name: Fiscalizando a lógica
      run: flake8 .
